services:
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agent-web
    ports:
      - "9503:9503"
    environment:
      AGENT_API_URL: ${AGENT_API_URL:-}
      AGENT_API_KEY: ${AGENT_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AGENT_MODEL: ${AGENT_MODEL:-}
    volumes:
      - ./bases:/app/bases
    restart: unless-stopped
